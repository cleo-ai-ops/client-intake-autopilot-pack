<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Career Proof Gap Checker</title><meta name="description" content="Free no-login checker for resume, LinkedIn, portfolio, follow-up, and public proof gaps."><style>body{font-family:Inter,system-ui,sans-serif;max-width:920px;margin:auto;padding:34px 18px;line-height:1.55;background:#f8fafc;color:#172033}.card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:20px;margin:14px 0}select,input{width:100%;box-sizing:border-box;padding:10px;border:1px solid #cbd5e1;border-radius:10px;margin:6px 0 12px}button,.btn{background:#0369a1;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:850;text-decoration:none}#out{white-space:pre-wrap;background:#fff;border:1px solid #bae6fd;border-radius:14px;padding:18px}</style></head><body><h1>Career Proof Gap Checker</h1><p>Score the proof surfaces that decide whether an application, recruiter reply, consulting pitch, or interview follow-up feels credible.</p><section class="card"><label>Target role or buyer<input id="target" placeholder="Senior frontend role, design clients, DevRel roles"></label><label>Resume proof<select id="resume"><option value="0">0 — generic / unclear</option><option value="1">1 — some relevant bullets</option><option value="2">2 — role-fit and evidence are clear</option></select></label><label>LinkedIn positioning<select id="linkedin"><option value="0">0 — vague headline/About</option><option value="1">1 — partially relevant</option><option value="2">2 — clear positioning + proof</option></select></label><label>Portfolio/case study proof<select id="portfolio"><option value="0">0 — no case study</option><option value="1">1 — project exists but weak proof</option><option value="2">2 — clear case study with constraints/decisions/outcome</option></select></label><label>Follow-up scripts<select id="follow"><option value="0">0 — no specific follow-up</option><option value="1">1 — basic templates</option><option value="2">2 — conversation-specific follow-ups ready</option></select></label><label>Public proof<select id="public"><option value="0">0 — none</option><option value="1">1 — one artifact/repo/post</option><option value="2">2 — artifact plus talk/article/project proof</option></select></label><button onclick="gen()">Find priority gap</button></section><section class="card"><h2>Plan</h2><div id="out"></div><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/career-proof-ops-bundle/">Get the full bundle</a></p></section><script>function gen(){let fields=['resume','linkedin','portfolio','follow','public'];let labels={resume:'Resume proof',linkedin:'LinkedIn positioning',portfolio:'Portfolio/case study proof',follow:'Interview/recruiter follow-up',public:'Public proof'};let scores=fields.map(f=>[f,+document.getElementById(f).value]);let low=scores.sort((a,b)=>a[1]-b[1])[0];let target=document.getElementById('target').value||'[target role/buyer]';let action={resume:'Rewrite 5 bullets for '+target+' using action + context + result.',linkedin:'Rewrite headline and About for '+target+' with one proof point.',portfolio:'Draft one case study with problem, constraints, your decisions, and proof.',follow:'Prepare one recruiter check-in and one interview thank-you tied to the actual conversation.',public:'Package one project into a repo, article, demo, or CFP abstract.'}[low[0]];out.innerText=`Target: ${target}

Priority gap: ${labels[low[0]]} (score ${low[1]}/2)

Next 45-minute action:
${action}

Rule: fix the lowest proof surface before polishing the others. Track one reply/interview/conversation signal before iterating.`}gen()</script></body></html>
