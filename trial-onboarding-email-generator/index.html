<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trial Onboarding Email Generator</title><meta name="description" content="Generate a SaaS trial onboarding email by day and segment. No login."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#eff6ff;color:#172554}main{max-width:900px;margin:auto;padding:30px 20px}label{display:block;margin-top:12px;font-weight:700}input,select,textarea{width:100%;padding:10px;border:1px solid #93c5fd;border-radius:10px}button,.btn{display:inline-block;background:#1d4ed8;color:white;border:0;border-radius:10px;padding:12px 15px;font-weight:800;margin-top:16px;text-decoration:none}.card{background:white;border:1px solid #93c5fd;border-radius:16px;padding:20px}textarea{min-height:300px}</style></head><body><main><h1>Trial Onboarding Email Generator</h1><p>Create a focused SaaS trial email by day, segment, and first-value action. No login.</p><div class="card"><label>Product<input id="product" value="Acme Analytics"></label><label>First value action<input id="action" value="connect your first data source"></label><label>Day<select id="day"><option>Day 0 welcome</option><option>Day 1 activation nudge</option><option>Day 3 use case</option><option>Day 5 FAQ/objection</option><option>Day 7 trial ending</option></select></label><label>Segment<select id="segment"><option>Founder</option><option>Team buyer</option><option>Technical user</option></select></label><button onclick="gen()">Generate email</button><label>Email<textarea id="out"></textarea></label><p><a class="btn" href="/client-intake-autopilot-pack/saas-trial-onboarding-email-kit/">Get the full SaaS Trial Onboarding Email Kit</a></p></div></main><script>function gen(){let p=product.value||'your product',a=action.value||'take the first setup step',d=day.value,s=segment.value;let subject=d.includes('Day 0')?`Your first step in ${p}`:d.includes('Day 1')?`Did you get set up in ${p}?`:d.includes('Day 3')?`A useful way to use ${p}`:d.includes('Day 5')?`Common question about ${p}`:`Your ${p} trial`;let angle=s==='Technical user'?'I included the most direct setup step and where to check details.':s==='Team buyer'?'This is the shortest path to show value to the rest of the team.':'This should help you see value quickly without a long setup.';out.value=`Subject: ${subject}

Hi [name],

Thanks for trying ${p}. The fastest way to get value is to ${a}.

${angle}

If you get blocked, reply with where you are stuck and I will point you to the next step.

Best,
[Your name]`;} gen()</script></body></html>
