<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CFP Abstract Generator</title><meta name="description" content="Free no-login conference CFP abstract generator for technical and professional talks."><style>body{font-family:Inter,system-ui,sans-serif;max-width:850px;margin:auto;padding:38px 18px;line-height:1.6}input,textarea,select{width:100%;padding:10px;margin:7px 0 14px;border:1px solid #cbd5e1;border-radius:10px}button{background:#7c3aed;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:800}#out{white-space:pre-wrap;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:18px;margin-top:18px}</style></head><body><h1>CFP Abstract Generator</h1><p>Create a conference proposal abstract with audience, problem, evidence, and takeaways.</p><label>Audience<input id="aud" placeholder="frontend engineers, solo founders, DevRel teams"></label><label>Problem/pain<textarea id="pain" placeholder="They struggle to measure onboarding quality without drowning in dashboards"></textarea></label><label>Your real experience/proof<textarea id="proof" placeholder="I rebuilt onboarding analytics for a B2B SaaS with 3 activation paths"></textarea></label><label>Three takeaways<textarea id="take" placeholder="how to choose one activation signal; what to instrument first; common dashboard traps"></textarea></label><button onclick="gen()">Generate abstract</button><div id="out"></div><p>Need talk-angle worksheets, bios, outline QA, follow-ups, and a tracker? <a href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/conference-cfp-proposal-kit/">Get the full kit</a>.</p><script>function gen(){let a=document.getElementById('aud').value||'[audience]';let p=document.getElementById('pain').value||'[specific problem]';let pr=document.getElementById('proof').value||'[real experience]';let t=document.getElementById('take').value||'[three concrete takeaways]';document.getElementById('out').innerText=`${a} often struggle with ${p}. In this talk, I will share lessons from ${pr}, including the tradeoffs, mistakes, and simple framework that made the work clearer. Attendees will leave with ${t}, plus a practical checklist they can adapt to their own context.`;}</script></body></html>
