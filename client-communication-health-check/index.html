<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Client Communication Health Check</title><meta name="description" content="Free no-login scorecard for finding client communication gaps in meetings, weekly status, scope changes, handoff, testimonials, reactivation, and invoices."><style>body{font-family:Inter,system-ui,sans-serif;max-width:920px;margin:auto;padding:34px 18px;line-height:1.55;background:#e0f2fe;color:#111827}.card{background:white;border:1px solid #7dd3fc;border-radius:18px;padding:20px;margin:14px 0}button,.btn{background:#0369a1;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:850;text-decoration:none}select{padding:8px;border-radius:8px;border:1px solid #38bdf8}#out{white-space:pre-wrap;background:#f0f9ff;border:1px solid #bae6fd;border-radius:14px;padding:18px}</style></head><body><h1>Client Communication Health Check</h1><p>Score your client communication operating system in 2 minutes.</p><section class="card" id="qs"></section><button onclick="gen()">Generate score</button><section class="card"><h2>Result</h2><div id="out"></div><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/client-communication-ops-bundle/">Get the full bundle</a></p></section><script>let items=['Meeting decisions are written down','Owners and due dates are explicit','Weekly updates include a project-health color','Risks are flagged before they become surprises','Scope changes become written approvals','Handoff includes assets/access/support boundaries','Testimonials or proof are requested after wins','Quiet past clients get useful reactivation follow-up','Late invoices have a calm follow-up schedule'];qs.innerHTML=items.map((x,i)=>`<p>${x}<br><select id=q${i}><option value=0>No</option><option value=1>Sometimes</option><option value=2>Yes</option></select></p>`).join('');function gen(){let score=items.reduce((s,x,i)=>s+Number(document.getElementById('q'+i).value),0);let band=score<7?'Urgent gaps':score<14?'Workable but leaky':'Strong system';let gaps=items.filter((x,i)=>Number(document.getElementById('q'+i).value)<2).slice(0,5);out.innerText=`Score: ${score} / 18

Fix these first:
${gaps.map(x=>'- '+x).join('
')||'- Keep the system maintained.'}
