<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bug Report Repro Checklist Generator</title><meta name="description" content="Generate a clean bug reproduction checklist from a vague report. No login."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#eff6ff;color:#172554}main{max-width:920px;margin:auto;padding:30px 20px}label{display:block;margin-top:12px;font-weight:700}input,select,textarea{width:100%;padding:10px;border:1px solid #bfdbfe;border-radius:10px}button,.btn{display:inline-block;background:#1d4ed8;color:white;border:0;border-radius:10px;padding:12px 15px;font-weight:800;margin-top:16px;text-decoration:none}textarea{min-height:380px}.card{background:white;border:1px solid #bfdbfe;border-radius:16px;padding:20px}</style></head><body><main><h1>Bug Report Repro Checklist Generator</h1><p>Convert a vague bug report into a checklist you can send to a customer or paste into a ticket. No login.</p><div class="card"><label>Feature/page<input id="feature" value="Billing settings"></label><label>Reported problem<input id="problem" value="Invoice PDF download fails"></label><label>User environment<input id="env" value="Chrome on macOS, admin role"></label><label>Observed impact<select id="impact"><option>customer blocked</option><option>workaround available</option><option>cosmetic/confusing</option><option>unknown</option></select></label><button onclick="gen()">Generate checklist</button><label>Output<textarea id="out"></textarea></label><p><a class="btn" href="/client-intake-autopilot-pack/bug-report-triage-kit/">Need macros, templates, and severity matrix? Get the Bug Report Triage Kit</a></p></div></main><script>function gen(){out.value=`# Bug reproduction checklist

Feature/page: ${feature.value}
Reported problem: ${problem.value}
Environment: ${env.value}
Impact: ${impact.value}

## Ask / confirm
- What exact action did the user take before the problem?
- What did they expect to happen?
- What happened instead?
- Does it happen every time or intermittently?
- Screenshot/video/error message available?
- Approximate time and timezone?

## Internal checks
- Test with the same role/environment if possible.
- Try a clean session or test account.
- Check logs around the reported timestamp.
- Record request ID, build/version, and related deploy.

## Triage result
- Reproduction status: reproduced / not reproduced / needs info
- Severity: S1 / S2 / S3 / S4
- Workaround: [write if available]
- Next customer update: [owner/date]`;} gen()</script></body></html>
