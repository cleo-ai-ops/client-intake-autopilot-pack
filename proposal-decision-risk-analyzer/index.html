<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Proposal Decision Risk Analyzer</title><meta name="description" content="Free no-login tool to diagnose why a freelance proposal has gone quiet and choose the right follow-up."><style>body{font-family:Inter,system-ui,sans-serif;max-width:960px;margin:auto;padding:34px 18px;background:#fff7ed;color:#1f2937;line-height:1.55}.card{background:white;border:1px solid #fed7aa;border-radius:18px;padding:20px;margin:14px 0}label{font-weight:800}select,input,textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #fdba74;border-radius:10px;margin:6px 0 14px}button,.btn{background:#9a3412;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:850;text-decoration:none}#out{white-space:pre-wrap;background:white;border:1px solid #fed7aa;border-radius:14px;padding:18px}</style></head><body><h1>Proposal Decision Risk Analyzer</h1><p>Before you follow up on a quiet proposal, diagnose the likely blocker so you do not send a generic “just checking in.”</p><section class="card"><label>Days since proposal<select id="days"><option>2-4 days</option><option>5-9 days</option><option>10-20 days</option><option>21+ days</option></select></label><label>What did they ask most about?<select id="signal"><option>price or budget</option><option>timing or priority</option><option>examples, proof, or process</option><option>who else needs to approve</option><option>scope/options</option><option>nothing specific</option></select></label><label>Proposal size<select id="size"><option>small first step</option><option>medium project</option><option>large project</option></select></label><label>Main outcome<input id="outcome" placeholder="launch the site, reduce manual reporting, improve onboarding"></label><button onclick="analyze()">Analyze risk</button></section><section class="card"><h2>Recommended follow-up move</h2><div id="out"></div><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/proposal-follow-up-close-kit/">Get the full Proposal Follow-Up & Close Kit</a></p></section><script>function analyze(){let s=signal.value,d=days.value,o=outcome.value||'[outcome]';let risk='Decision clarity risk',move='Ask whether they want the original plan, a smaller first step, or a later revisit.';if(s.includes('price')){risk='Price/scope risk';move='Do not discount first. Offer a smaller first phase focused on '+o+'.';}if(s.includes('timing')){risk='Timing/priority risk';move='Ask whether this is still a near-term priority and offer a specific revisit date.';}if(s.includes('proof')){risk='Trust/proof risk';move='Send one relevant proof point or a short process snapshot tied to '+o+'.';}if(s.includes('approve')){risk='Stakeholder approval risk';move='Offer a forwardable one-page summary with outcome, scope, timeline, and decision needed.';}if(s.includes('scope')){risk='Scope clarity risk';move='Recap the first milestone and name what is intentionally excluded.';}if(d==='21+ days'){move+=' If there is no response, close the loop politely and preserve future opportunity.'}out.innerText=`Likely blocker: ${risk}

Best next move: ${move}

Follow-up angle:
Hi [Name], I wanted to check whether ${o} is still active on your side. If the original proposal feels too broad, I can suggest a smaller first step; if timing has shifted, I can also revisit this later. What would be most useful?`;}analyze()</script></body></html>
