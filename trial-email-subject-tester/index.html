<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trial Email Subject Line Tester</title><meta name="description" content="Score SaaS trial onboarding subject lines for clarity, specificity, and next-step focus. No login."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#f8fafc;color:#0f172a}main{max-width:900px;margin:auto;padding:32px 20px}.card{background:white;border:1px solid #bfdbfe;border-radius:16px;padding:20px;margin:16px 0;box-shadow:0 8px 24px #1d4ed811}label{display:block;font-weight:800;margin-top:12px}input,textarea,select{width:100%;padding:11px;border:1px solid #93c5fd;border-radius:10px;font:inherit}button,.btn{display:inline-block;background:#1d4ed8;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:900;text-decoration:none;margin-top:14px}.score{font-size:42px;font-weight:900;color:#1d4ed8}.good{color:#047857}.warn{color:#b45309}.bad{color:#b91c1c}ul{padding-left:20px}</style></head><body><main><p><a href="/client-intake-autopilot-pack/saas-trial-onboarding-email-kit/">← SaaS Trial Onboarding Email Kit</a></p><h1>Trial Email Subject Line Tester</h1><p>Quickly check whether a SaaS trial onboarding subject line is specific, useful, and tied to a next step. No login.</p><div class="card"><label>Subject line<input id="subject" value="Did you connect your first data source?"></label><label>Trial day<select id="day"><option>Day 0 welcome</option><option>Day 1 activation nudge</option><option>Day 3 use case</option><option>Day 5 objection / FAQ</option><option>Day 7 trial ending</option></select></label><label>First value action<input id="action" value="connect your first data source"></label><button onclick="scoreIt()">Score subject</button></div><div class="card"><div class="score" id="score">0/100</div><h2>Feedback</h2><ul id="feedback"></ul><h2>Safer alternatives</h2><textarea id="alts"></textarea><p><a class="btn" href="/client-intake-autopilot-pack/saas-trial-onboarding-email-kit/">Get the full SaaS Trial Onboarding Email Kit — €4.50</a></p></div></main><script>function scoreIt(){const s=subject.value.trim(); const a=action.value.trim(); let pts=40; let f=[]; function add(ok,msg,delta){if(ok){pts+=delta;f.push('<li class="good">✓ '+msg+'</li>')}else{pts-=Math.abs(delta);f.push('<li class="warn">Improve: '+msg+'</li>')}} add(s.length>=25&&s.length<=60,'Length is readable in most inboxes.',12); add(/(set up|connect|try|check|first|next|ready|ending|question|blocked)/i.test(s),'Uses a concrete next-step word.',14); add(a&&s.toLowerCase().includes(a.split(' ')[0].toLowerCase()),'Matches the first-value action.',16); add(!/urgent|last chance|guaranteed|secret|hack|!!!/i.test(s),'Avoids spammy pressure words.',10); add(!/newsletter|update|welcome to our platform/i.test(s),'Does not sound like a generic nurture email.',8); pts=Math.max(0,Math.min(100,pts)); score.textContent=pts+'/100'; feedback.innerHTML=f.join(''); let product='[product]'; alts.value=[`Can you ${a} today?`,`Your quickest path to first value in ${product}`,`Stuck before you ${a}?`,`One useful way to start with ${product}`,`Before your trial ends: ${a}`].join('
');} scoreIt()</script></body></html>
