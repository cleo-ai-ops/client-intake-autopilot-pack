<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Newsletter Ad-Swap Outreach Generator</title><style>body{font-family:Inter,system-ui,sans-serif;background:#f8fafc;color:#172033}main{max-width:820px;margin:auto;padding:44px 22px}input,textarea,select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;margin:8px 0 14px}button,.btn{background:#2563eb;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:700;text-decoration:none;display:inline-block}#out{white-space:pre-wrap;background:white;border:1px solid #e2e8f0;border-radius:16px;padding:20px;margin-top:18px}</style></head><body><main><h1>Newsletter Ad-Swap Outreach Generator</h1><p>Create a concise ad-swap pitch for a peer newsletter. No login.</p><label>Their newsletter<input id="their" placeholder="e.g. Indie SaaS Weekly"></label><label>Your newsletter<input id="mine" placeholder="e.g. Founder Ops Notes"></label><label>Audience overlap<input id="overlap" placeholder="e.g. solo founders improving activation"></label><label>Placement<select id="placement"><option>short classified blurb</option><option>sponsor-style recommendation</option><option>dedicated section</option></select></label><button onclick="gen()">Generate pitch</button><div id="out"></div><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/newsletter-adswap-growth-kit/">Get the full ad-swap kit</a></p><script>function gen(){const t=their.value||'[Their newsletter]';const m=mine.value||'[Your newsletter]';const o=overlap.value||'[audience overlap]';const p=placement.value;out.textContent=`Subject: ad-swap idea for ${t}?

Hi [Name],

I liked your recent issue and the way ${t} covers ${o}. I write ${m} for a similar reader group.

Would you be open to a simple newsletter ad-swap this month? I can feature ${t} as a ${p} and send copy + tracking link in advance.

If helpful, I can share my audience size and recent click range so the swap feels fair.

Best,
[Your name]`;}</script></main></body></html>
