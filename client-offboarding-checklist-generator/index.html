<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Client Offboarding Checklist Generator</title><meta name="description" content="Generate a freelancer client handoff/offboarding checklist and final delivery email. No login."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#f8fafc;color:#172033}main{max-width:900px;margin:auto;padding:30px 20px}label{display:block;margin-top:12px;font-weight:700}input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px}button,.btn{display:inline-block;background:#0f766e;color:white;border:0;border-radius:10px;padding:12px 15px;font-weight:800;margin-top:16px;text-decoration:none}textarea{min-height:360px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:20px}</style></head><body><main><h1>Client Offboarding Checklist Generator</h1><p>Create a final handoff checklist, support-boundary note, and closing email. No login.</p><div class="card"><label>Client name<input id="client" value="Alex"></label><label>Project<input id="project" value="website redesign"></label><label>Support window<select id="support"><option>14 days</option><option>7 days</option><option>30 days</option></select></label><label>Maintenance option<input id="maint" value="monthly updates and small fixes"></label><button onclick="gen()">Generate handoff packet</button><label>Output<textarea id="out"></textarea></label><p><a class="btn" href="/client-intake-autopilot-pack/client-offboarding-handoff-kit/">Need the full templates? Get the Client Offboarding & Handoff Kit</a></p></div></main><script>function gen(){let c=client.value||'there',p=project.value||'the project',s=support.value,m=maint.value||'ongoing support';out.value=`Subject: Final handoff for ${p}

Hi ${c},

The final handoff for ${p} is ready here: [link].

Please review these items:
- Final files/deliverables: [link]
- Access or ownership transfers: [details]
- Key notes and instructions: [link]
- Outstanding invoice/payment status: [status]

The included support window covers small fixes/questions related to the delivered scope for ${s}. New requests, feature additions, or third-party/platform changes can be scoped separately.

If you want help after the support window, I can offer a lightweight maintenance option for ${m}. No pressure — the project is fully delivered either way.

Thanks again,
[your name]

Checklist:
[ ] Final files shared
[ ] Account ownership/access confirmed
[ ] Instructions included
[ ] Support window end date documented
[ ] Maintenance option offered if relevant
[ ] Testimonial/referral ask scheduled`;} gen()</script></body></html>
