<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Free Proposal Follow-Up Email Generator</title><meta name="description" content="Generate a polite follow-up email for quiet proposals."><style>body{font-family:Inter,system-ui,sans-serif;max-width:920px;margin:auto;padding:34px 18px;line-height:1.55;background:#ffedd5;color:#1f2937}textarea,input,select{width:100%;box-sizing:border-box;padding:10px;border:1px solid #fdba74;border-radius:10px;margin:6px 0 12px}button,.btn{background:#9a3412;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:850;text-decoration:none}.card{background:white;border:1px solid #fed7aa;border-radius:18px;padding:20px;margin:14px 0}#out{white-space:pre-wrap;background:#fff;border:1px solid #fed7aa;border-radius:14px;padding:18px}</style></head><body><h1>Proposal Follow-Up Email Generator</h1><p>Create a calm follow-up for a proposal that has gone quiet.</p><section class="card"><label>Client / company<input id="client" placeholder="Acme Co"></label><label>Project / outcome<input id="project" placeholder="website redesign, reporting automation, onboarding cleanup"></label><label>Days since proposal<select id="days"><option>2</option><option>5</option><option>10</option><option>21</option></select></label><label>Likely blocker<select id="blocker"><option>not sure</option><option>budget</option><option>timing</option><option>internal approval</option><option>unclear scope</option><option>trust/proof</option></select></label><button onclick="gen()">Generate follow-up</button></section><section class="card"><h2>Email draft</h2><div id="out"></div><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/proposal-follow-up-close-kit/">Get the full close kit</a></p></section><script>function gen(){let c=client.value||'[Client]';let p=project.value||'[project]';let d=days.value;let b=blocker.value;let extra={'budget':'If the full scope feels heavy, I can suggest a smaller first phase focused on the highest-value outcome.','timing':'If timing has shifted, I can either pause this or check back around a better date.','internal approval':'If another stakeholder needs context, I can send a short forwardable summary.','unclear scope':'If the scope feels too broad, I can tighten the first milestone and clarify what is excluded.','trust/proof':'If proof would help, I can send a relevant example or process snapshot.','not sure':'If scope, timing, or budget needs adjusting, I can reshape the first step.'}[b];out.innerText=`Subject: Quick check on ${p}

Hi ${c},

Just following up on the proposal for ${p}. I know priorities move quickly, so I wanted to check whether this is still active on your side.

${extra}

Would you prefer I keep the original plan open, send a leaner first-step option, or revisit this later?

Best,
[Your name]`}gen()</script></body></html>
