<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Testimonial Request Generator</title><meta name="description" content="Generate a client testimonial request email with permission wording. No login."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#f8fafc;color:#172033}main{max-width:880px;margin:auto;padding:30px 20px}label{display:block;margin-top:12px;font-weight:700}input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px}button,.btn{display:inline-block;background:#4f46e5;color:white;border:0;border-radius:10px;padding:12px 15px;font-weight:800;margin-top:16px;text-decoration:none}textarea{min-height:290px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:20px}</style></head><body><main><h1>Testimonial Request Generator</h1><p>Draft a specific testimonial ask with client-friendly prompts and permission wording. No login.</p><div class="card"><label>Client name<input id="client" value="Alex"></label><label>Project/result<input id="result" value="the new onboarding flow we launched"></label><label>Use case<select id="kind"><option>freelance project</option><option>SaaS customer</option><option>consulting engagement</option></select></label><button onclick="gen()">Generate request</button><label>Draft<textarea id="out"></textarea></label><p><a class="btn" href="/client-intake-autopilot-pack/client-testimonial-request-kit/">Need the full template pack? Get the Client Testimonial Request Kit</a></p></div></main><script>function gen(){let c=client.value||'there',r=result.value||'the project',k=kind.value;let subject='Quick testimonial request';let body=`Hi ${c},

I’m glad we were able to complete ${r}. Would you be open to sharing 2-3 sentences I can use as a testimonial?

A useful quote could mention:
- what problem you had before,
- what changed after ${k==='SaaS customer'?'using the product':'working together'}, and
- what the process felt like.

If easier, I can draft a short version for your approval. I’ll only publish it with your permission, and I can use your name/company or keep it anonymized if you prefer.

Thanks,
[your name]`; out.value='Subject: '+subject+'

'+body} gen()</script></body></html>
