<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Podcast Pitch Email Generator</title><style>body{font-family:Inter,system-ui,sans-serif;max-width:820px;margin:auto;padding:38px 18px;line-height:1.6}input,textarea{width:100%;padding:10px;margin:7px 0 14px;border:1px solid #cbd5e1;border-radius:10px}button{background:#7c3aed;color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:800}#out{white-space:pre-wrap;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:18px;margin-top:18px}</style></head><body><h1>Podcast Pitch Email Generator</h1><p>Create a host-first guest pitch with a specific listener takeaway.</p><label>Podcast / host name<input id="pod" placeholder="e.g. Indie Founders Podcast"></label><label>Episode you listened to<input id="ep" placeholder="Episode with ..."></label><label>Your useful angle<input id="angle" placeholder="How small teams can..."></label><label>Audience takeaway<input id="take" placeholder="Listeners will learn..."></label><button onclick="gen()">Generate pitch</button><div id="out"></div><p>Need the full scoring worksheet, one-sheet, follow-ups, prep checklist, and tracker? <a href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/podcast-guest-pitch-kit/">Get the Podcast Guest Pitch Kit</a>.</p><script>function gen(){let pod=document.getElementById('pod').value||'[Podcast]';let ep=document.getElementById('ep').value||'[specific episode]';let angle=document.getElementById('angle').value||'[your practical angle]';let take=document.getElementById('take').value||'[listener takeaway]';document.getElementById('out').innerText=`Subject: Guest idea for ${pod}: ${angle}

Hi [Host],

I listened to ${ep} and liked the part about [specific note].

A possible episode angle for your audience: ${angle}. The listener takeaway would be: ${take}.

I can bring 2-3 practical examples, what went wrong, and a simple framework listeners can use. No pressure if it is not a fit — happy to send a short one-sheet if useful.

Best,
[Name]`;}</script></body></html>
