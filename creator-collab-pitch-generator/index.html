<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creator Collab Pitch Generator</title><style>body{font-family:Inter,system-ui,sans-serif;max-width:820px;margin:auto;padding:38px 18px;line-height:1.6}input,textarea{width:100%;padding:10px;margin:7px 0 14px;border:1px solid #cbd5e1;border-radius:10px}button{background:#ea580c;color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:800}#out{white-space:pre-wrap;background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:18px;margin-top:18px}</style></head><body><h1>Creator Collab Pitch Generator</h1><p>Create a specific cross-promotion or collaboration pitch with a clear value exchange.</p><label>Partner name / project<input id="p" placeholder="e.g. Maker Weekly"></label><label>Specific thing you like<input id="n" placeholder="their recent issue about..."></label><label>Your collaboration idea<input id="idea" placeholder="a resource swap / joint checklist / interview swap"></label><label>Value for their audience<input id="value" placeholder="their readers get..."></label><button onclick="gen()">Generate pitch</button><div id="out"></div><p>Need scoring, briefs, follow-ups, and tracker? <a href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/creator-collaboration-pitch-kit/">Get the Creator Collaboration Pitch Kit</a>.</p><script>function gen(){let p=document.getElementById('p').value||'[Partner]';let n=document.getElementById('n').value||'[specific note]';let idea=document.getElementById('idea').value||'[collaboration idea]';let value=document.getElementById('value').value||'[audience value]';document.getElementById('out').innerText=`Subject: Collaboration idea for ${p}

Hi [Name],

I liked ${n}. Our audiences seem adjacent, and I had a small collaboration idea: ${idea}.

The value for your audience would be: ${value}.

I can make this lightweight by drafting the copy/assets for review and using a simple tracking link. If useful, I can send a short brief with deliverables and timing.

Best,
[Name]`;}</script></body></html>
