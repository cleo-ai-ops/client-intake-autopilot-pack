<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Application Proof Tracker Generator</title><meta name="description" content="Free no-login tracker that turns a target job, client, or opportunity into proof gaps and next actions."><style>body{font-family:Inter,system-ui,sans-serif;max-width:960px;margin:auto;padding:34px 18px;line-height:1.55;background:#f8fafc;color:#172033}.card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 8px 20px #0f172a0a}input,textarea,select{width:100%;box-sizing:border-box;padding:10px;border:1px solid #cbd5e1;border-radius:10px;margin:6px 0 12px}textarea{min-height:76px}button,.btn{background:#0369a1;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:850;text-decoration:none;display:inline-block}#out{white-space:pre-wrap;background:#fff;border:1px solid #bae6fd;border-radius:14px;padding:18px}.muted{color:#64748b}</style></head><body><h1>Application Proof Tracker Generator</h1><p class="muted">For job seekers, freelancers, consultants, and career switchers who need to match proof to a specific opportunity before applying or pitching.</p><section class="card"><label>Opportunity / target<input id="target" placeholder="Senior frontend role at B2B SaaS, fractional ops client, DevRel CFP"></label><label>What they need to believe<textarea id="belief" placeholder="I can ship accessible UI, explain technical tradeoffs, and collaborate with product."></textarea></label><label>Your strongest existing proof<textarea id="proof" placeholder="Project, metric, case study, repo, testimonial, talk, shipped feature..."></textarea></label><label>Weakest proof surface<select id="gap"><option>Resume bullets</option><option>LinkedIn headline/About</option><option>Portfolio case study</option><option>Interview follow-up</option><option>Public proof / talk / repo</option><option>Client pitch proof</option></select></label><button onclick="gen()">Generate tracker row</button></section><section class="card"><h2>Tracker row + next action</h2><div id="out"></div><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/career-proof-ops-bundle/?utm_source=application_tracker&utm_medium=free_tool&utm_campaign=career_proof_bundle">Get the Career Proof Ops Bundle</a></p></section><script>function gen(){const target=document.getElementById('target').value||'[target opportunity]';const belief=document.getElementById('belief').value||'[belief the buyer/recruiter needs]';const proof=document.getElementById('proof').value||'[best proof]';const gap=document.getElementById('gap').value;let action='';if(gap.includes('Resume')) action='Rewrite 3 bullets so each names context, action, and evidence for '+target+'.';else if(gap.includes('LinkedIn')) action='Rewrite headline/About to state target, specialty, and one proof point.';else if(gap.includes('Portfolio')) action='Draft one case study: problem, constraints, decision, result, artifact.';else if(gap.includes('Interview')) action='Prepare a follow-up that references one conversation detail and one proof artifact.';else if(gap.includes('Public')) action='Package one artifact into a repo, short post, demo, or CFP abstract.';else action='Turn the proof into a concise client pitch paragraph with a specific outcome.';out.innerText=`CSV row:
"${target}","${belief.replaceAll('"','')}","${proof.replaceAll('"','')}","${gap}","${action}","Not sent"

Next 30-minute action:
${action}

Rule: do not send the application/pitch until one proof surface directly supports what they need to believe.`}gen()</script></body></html>
