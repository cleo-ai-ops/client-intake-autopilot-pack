<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Incident Update Generator</title><meta name="description" content="Generate a calm SaaS incident status update without login."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#f8fafc;color:#172033}main{max-width:880px;margin:auto;padding:30px 20px}label{display:block;margin-top:12px;font-weight:700}input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px}button,.btn{display:inline-block;background:#6d28d9;color:white;border:0;border-radius:10px;padding:12px 15px;font-weight:800;margin-top:16px;text-decoration:none}textarea{min-height:300px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:20px}</style></head><body><main><h1>Incident Update Generator</h1><p>Create a clear status-page or support update for a SaaS incident. No login, no form submission.</p><div class="card"><label>Status<select id="status"><option>Investigating</option><option>Identified</option><option>Monitoring</option><option>Resolved</option></select></label><label>Affected feature<input id="feature" value="webhook deliveries"></label><label>Customer-visible symptom<input id="symptom" value="delayed webhook delivery"></label><label>Next update time<input id="next" value="30 minutes"></label><button onclick="gen()">Generate update</button><label>Draft<textarea id="out"></textarea></label><p><a class="btn" href="/client-intake-autopilot-pack/saas-incident-update-kit/">Need full templates and support replies? Get the SaaS Incident Update Kit</a></p></div></main><script>function gen(){let st=status.value, f=feature.value||'the affected feature', s=symptom.value||'service disruption', n=next.value||'30 minutes'; let msg=''; if(st==='Investigating') msg=`We are investigating an issue affecting ${f}. Some customers may see ${s}.

We are checking the relevant systems now and will post the next update in ${n}. We will avoid guessing at root cause until we have verified it.`; if(st==='Identified') msg=`We have identified the likely cause of the issue affecting ${f} and are working on a fix. Current customer impact: ${s}.

Next update in ${n}.`; if(st==='Monitoring') msg=`A fix has been applied for the issue affecting ${f} and we are monitoring recovery. Customers should see improvement in ${s}.

We will confirm resolution after the system remains stable. Next update in ${n}.`; if(st==='Resolved') msg=`The issue affecting ${f} has been resolved. Customers should no longer see ${s}.

We are reviewing the timeline and contributing factors, and will follow up if further action is needed.`; out.value=msg} gen()</script></body></html>
