<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creator Outreach Channel Planner</title><meta name="description" content="Choose whether to pitch sponsorships, newsletter swaps, podcast guest spots, or creator collaborations. No login."><style>body{font-family:Inter,system-ui,sans-serif;max-width:950px;margin:auto;padding:34px 18px;background:#f8fafc;color:#172033;line-height:1.55}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:20px}label{font-weight:800;display:block;margin-top:12px}input,select{width:100%;box-sizing:border-box;padding:10px;border:1px solid #cbd5e1;border-radius:10px}button,.btn{display:inline-block;background:#ea580c;color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:850;text-decoration:none;margin-top:14px}#out{white-space:pre-wrap;min-height:360px}</style></head><body><h1>Creator Outreach Channel Planner</h1><p>Score your current situation and pick the most realistic outreach motion for the next 14 days.</p><div class="grid"><section class="card"><label>Audience size / proof<select id="proof"><option value="1">Small or early audience</option><option value="2">Some proof: replies, subscribers, clients, or case studies</option><option value="3">Strong niche proof and clear audience description</option></select></label><label>Main goal<select id="goal"><option>Revenue</option><option>Audience growth</option><option>Authority</option><option>Partnerships</option></select></label><label>Can you offer a useful free asset?<select id="asset"><option value="1">Not yet</option><option value="2">Yes, simple checklist/template</option><option value="3">Yes, strong resource or proven content</option></select></label><label>Warm partner list size<input id="list" type="number" value="12"></label><button onclick="gen()">Plan channel</button></section><section class="card"><h2>Recommendation</h2><div id="out"></div><button onclick="navigator.clipboard.writeText(out.innerText)">Copy plan</button><p><a class="btn" href="https://cleo-ai-ops.github.io/client-intake-autopilot-pack/creator-outreach-ops-bundle/">Get the full bundle</a></p></section></div><script>function gen(){let proof=+document.getElementById('proof').value, asset=+document.getElementById('asset').value, goal=document.getElementById('goal').value, list=+document.getElementById('list').value;let channel='Creator collaboration';if(goal==='Revenue'&&proof>=2) channel='Sponsorship pitch'; else if(goal==='Audience growth'&&list>=8) channel='Newsletter ad-swap'; else if(goal==='Authority'&&asset>=2) channel='Podcast guest pitch'; else if(goal==='Partnerships') channel='Creator collaboration';let next=channel==='Sponsorship pitch'?'Build a one-page rate rationale and send 5 sponsor-fit pitches.':channel==='Newsletter ad-swap'?'Pick 10 audience-overlap newsletters and propose one clean swap.':channel==='Podcast guest pitch'?'Score 15 shows and pitch the 5 highest-fit hosts with one specific episode angle.':'Draft a partner-first collaboration brief and send it to 5 high-fit creators.';out.innerText=`Recommended channel: ${channel}

Why: Goal = ${goal}, proof score = ${proof}, free asset score = ${asset}, warm list = ${list}.

14-day next action:
${next}

Evidence to track:
- Pitches sent
- Positive replies
- Objections
- Follow-ups due
- Clicks/subscribers/revenue if any

Rule: send 10 specific pitches before judging the channel.`}gen()</script></body></html>
